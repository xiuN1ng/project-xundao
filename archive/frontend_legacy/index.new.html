  <title>寻道修仙</title>
  <link rel="stylesheet" href="css/mobile.css">
  <style>
    /* ==================== 修仙主题 CSS 变量系统 ==================== */
    :root {
      --bg-primary: #0a0a12;
      --bg-secondary: #12121f;
      --bg-card: rgba(18, 18, 32, 0.92);
      --bg-card-hover: rgba(28, 25, 45, 0.95);
      --accent-primary: #b8860b;
      --accent-secondary: #daa520;
      --accent-gold: #ffd700;
      --accent-gold-light: #ffec8b;
      --color-spirit: #00ffff;
      --color-cyan: #40e0d0;
      --color-exp: #ff6b9d;
      --color-stones: #ffd700;
      --color-health: #ff4444;
      --color-success: #00ff88;
      --color-warning: #ff8c00;
      --text-primary: #e8e8f0;
      --text-secondary: #a0a0b8;
      --text-muted: #606080;
      --border-color: rgba(184, 134, 11, 0.25);
      --border-glow: rgba(255, 215, 0, 0.4);
      --border-bronze: rgba(205, 127, 50, 0.4);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.5);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.6);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.7);
      --shadow-glow: 0 0 20px rgba(255, 215, 0, 0.2);
      --shadow-cyan-glow: 0 0 20px rgba(0, 255, 255, 0.2);
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --font-family: 'KaiTi', 'STKaiti', 'SimSun', 'Microsoft YaHei', 'PingFang SC', serif;
      --transition-fast: 0.15s ease;
      --transition-normal: 0.25s ease;
      --transition-slow: 0.4s ease;
    }
    .auth-container { z-index: 9997 !important; }
    /* Loading overlay for async HTML load */
    #game-body-container { min-height: 100vh; }
  </style>
</head>
