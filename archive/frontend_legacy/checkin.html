<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日签到 - 挂机修仙</title>
  <style>
    :root {
      --primary-color: #7c3aed;
      --secondary-color: #a855f7;
      --accent-color: #fbbf24;
      --bg-dark: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-card-hover: #252542;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --success-color: #10b981;
      --danger-color: #ef4444;
      --border-glow: rgba(124, 58, 237, 0.5);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
      min-height: 100vh;
      color: var(--text-primary);
      background-attachment: fixed;
    }
    
    /* 背景装饰 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(251, 191, 36, 0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* 头部 */
    .header {
      text-align: center;
      padding: 30px 0;
      position: relative;
    }
    
    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
      margin-bottom: 10px;
    }
    
    .header .subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }
    
    /* 签到卡片 */
    .checkin-card {
      background: linear-gradient(145deg, var(--bg-card) 0%, #12121f 100%);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      border: 1px solid rgba(124, 58, 237, 0.3);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }
    
    .checkin-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary-color), var(--accent-color), var(--primary-color), transparent);
    }
    
    /* 用户信息 */
    .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
    }
    
    .user-stats {
      display: flex;
      gap: 30px;
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--accent-color);
    }
    
    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    
    /* 签到按钮 */
    .checkin-btn {
      padding: 15px 40px;
      font-size: 1.2rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .checkin-btn.can-checkin {
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
      color: white;
      box-shadow: 0 5px 20px rgba(124, 58, 237, 0.4);
    }
    
    .checkin-btn.can-checkin:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.6);
    }
    
    .checkin-btn.can-checkin:active {
      transform: translateY(0);
    }
    
    .checkin-btn.checked-in {
      background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
      color: #9ca3af;
      cursor: not-allowed;
    }
    
    .checkin-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    /* 签到按钮动画 */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 5px 20px rgba(124, 58, 237, 0.4); }
      50% { box-shadow: 0 5px 40px rgba(124, 58, 237, 0.8); }
    }
    
    .checkin-btn.can-checkin {
      animation: pulse 2s infinite;
    }
    
    /* 累计签到奖励 */
    .rewards-section {
      margin-top: 30px;
    }
    
    .section-title {
      font-size: 1.3rem;
      color: var(--text-primary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .section-title::before {
      content: '🎁';
    }
    
    .rewards-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }
    
    .reward-item {
      background: linear-gradient(145deg, var(--bg-card-hover) 0%, #1a1a28 100%);
      border-radius: 12px;
      padding: 15px 10px;
      text-align: center;
      border: 1px solid rgba(124, 58, 237, 0.2);
      transition: all 0.3s ease;
    }
    
    .reward-item.claimed {
      border-color: var(--success-color);
      background: linear-gradient(145deg, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%);
    }
    
    .reward-item.current {
      border-color: var(--accent-color);
      box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
      animation: glow 2s infinite;
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
      50% { box-shadow: 0 0 30px rgba(251, 191, 36, 0.6); }
    }
    
    .reward-day {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .reward-icon {
      font-size: 1.8rem;
      margin-bottom: 5px;
    }
    
    .reward-amount {
      font-size: 0.85rem;
      color: var(--accent-color);
      font-weight: bold;
    }
    
    .reward-status {
      font-size: 0.7rem;
      margin-top: 5px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    
    .reward-item.claimed .reward-status {
      background: var(--success-color);
      color: white;
    }
    
    .reward-item.current .reward-status {
      background: var(--accent-color);
      color: #1a1a2e;
    }
    
    .reward-item.locked .reward-status {
      background: rgba(100, 116, 139, 0.3);
      color: var(--text-secondary);
    }
    
    /* 日历 */
    .calendar-section {
      margin-top: 30px;
    }
    
    .calendar {
      background: var(--bg-card);
      border-radius: 15px;
      padding: 20px;
      border: 1px solid rgba(124, 58, 237, 0.2);
    }
    
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .calendar-title {
      font-size: 1.2rem;
      font-weight: bold;
    }
    
    .calendar-nav {
      display: flex;
      gap: 10px;
    }
    
    .calendar-nav button {
      background: var(--bg-card-hover);
      border: 1px solid rgba(124, 58, 237, 0.3);
      color: var(--text-primary);
      padding: 5px 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .calendar-nav button:hover {
      background: var(--primary-color);
    }
    
    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      margin-bottom: 10px;
    }
    
    .weekday {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
      padding: 8px;
    }
    
    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }
    
    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: var(--bg-card-hover);
      border: 1px solid transparent;
      transition: all 0.3s;
      position: relative;
    }
    
    .calendar-day.empty {
      background: transparent;
    }
    
    .calendar-day.checked {
      background: linear-gradient(145deg, rgba(124, 58, 237, 0.3) 0%, rgba(124, 58, 237, 0.1) 100%);
      border-color: var(--primary-color);
    }
    
    .calendar-day.today {
      border-color: var(--accent-color);
    }
    
    .calendar-day .day-number {
      font-size: 0.9rem;
      font-weight: bold;
    }
    
    .calendar-day.checked .day-number {
      color: var(--primary-color);
    }
    
    .calendar-day .check-mark {
      font-size: 0.7rem;
      color: var(--success-color);
    }
    
    /* 返回按钮 */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: var(--bg-card);
      border: 1px solid rgba(124, 58, 237, 0.3);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      z-index: 100;
    }
    
    .back-btn:hover {
      background: var(--primary-color);
      transform: translateX(-5px);
    }
    
    /* 消息提示 */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: linear-gradient(135deg, var(--bg-card) 0%, #1f2937 100%);
      border: 1px solid var(--primary-color);
      padding: 15px 30px;
      border-radius: 12px;
      color: var(--text-primary);
      z-index: 1000;
      transition: transform 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
    
    .toast.success {
      border-color: var(--success-color);
    }
    
    .toast.error {
      border-color: var(--danger-color);
    }
    
    /* 加载动画 */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(124, 58, 237, 0.3);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* 响应式 */
    @media (max-width: 600px) {
      .rewards-grid {
        grid-template-columns: repeat(4, 1fr);
      }
      
      .user-stats {
        flex-direction: column;
        gap: 15px;
      }
      
      .checkin-btn {
        width: 100%;
        margin-top: 15px;
      }
    }
    
    /* 飘字效果 */
    .floating-text {
      position: fixed;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent-color);
      pointer-events: none;
      animation: floatUp 1.5s ease-out forwards;
      z-index: 1000;
    }
    
    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-100px) scale(1.5);
      }
    }
  </style>
</head>
<body>
  <a href="/" class="back-btn">← 返回游戏</a>
  
  <div class="container">
    <header class="header">
      <h1>✨ 每日签到 ✨</h1>
      <p class="subtitle">修仙之路，从每日签到开始</p>
    </header>
    
    <div class="checkin-card">
      <div class="user-info">
        <div class="user-stats">
          <div class="stat-item">
            <div class="stat-value" id="currentStreak">0</div>
            <div class="stat-label">连续签到</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalCheckins">0</div>
            <div class="stat-label">累计签到</div>
          </div>
        </div>
        <button class="checkin-btn can-checkin" id="checkinBtn" onclick="doCheckin()">
          立即签到
        </button>
      </div>
      
      <div class="rewards-section">
        <h3 class="section-title">累计签到奖励</h3>
        <div class="rewards-grid" id="rewardsGrid">
          <!-- 奖励项将通过 JS 渲染 -->
        </div>
      </div>
    </div>
    
    <div class="calendar-section">
      <div class="calendar">
        <div class="calendar-header">
          <div class="calendar-title" id="calendarTitle">2024年1月</div>
          <div class="calendar-nav">
            <button onclick="changeMonth(-1)">◀</button>
            <button onclick="changeMonth(1)">▶</button>
          </div>
        </div>
        <div class="calendar-weekdays">
          <div class="weekday">日</div>
          <div class="weekday">一</div>
          <div class="weekday">二</div>
          <div class="weekday">三</div>
          <div class="weekday">四</div>
          <div class="weekday">五</div>
          <div class="weekday">六</div>
        </div>
        <div class="calendar-days" id="calendarDays">
          <!-- 日历将通过 JS 渲染 -->
        </div>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    // 全局变量
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let checkinData = null;
    let playerId = localStorage.getItem('player_id') || 'player_1';
    
    // 奖励配置
    const rewards = [
      { day: 1, spirit_stones: 100, spirit: 1000, items: [], icon: '💎' },
      { day: 2, spirit_stones: 200, spirit: 2000, items: [{ name: '下品灵石袋' }], icon: '💎' },
      { day: 3, spirit_stones: 300, spirit: 3000, items: [{ name: '中品灵石袋' }], icon: '💎' },
      { day: 4, spirit_stones: 400, spirit: 4000, items: [], icon: '💎' },
      { day: 5, spirit_stones: 500, spirit: 5000, items: [{ name: '上品灵石袋' }], icon: '💎' },
      { day: 6, spirit_stones: 600, spirit: 6000, items: [], icon: '💎' },
      { day: 7, spirit_stones: 1000, spirit: 10000, items: [{ name: '极品灵石袋' }, { name: '筑基丹' }], icon: '🎁' }
    ];
    
    // 初始化
    async function init() {
      await loadCheckinData();
      renderRewards();
      renderCalendar();
    }
    
    // 加载签到数据
    async function loadCheckinData() {
      try {
        const response = await fetch(`/api/checkin/info?player_id=${playerId}`);
        const result = await response.json();
        
        if (result.success) {
          checkinData = result.data;
          updateUI();
        } else {
          showToast(result.message || '加载失败', 'error');
        }
      } catch (error) {
        console.error('加载签到数据失败:', error);
        // 使用本地存储的默认数据
        checkinData = {
          can_checkin: true,
          checked_in_today: false,
          current_streak: 0,
          total_checkins: 0,
          monthly_checkins: [],
          rewards: rewards.map((r, i) => ({ day: i + 1, claimed: false, ...r }))
        };
        updateUI();
      }
    }
    
    // 更新UI
    function updateUI() {
      document.getElementById('currentStreak').textContent = checkinData.current_streak || 0;
      document.getElementById('totalCheckins').textContent = checkinData.total_checkins || 0;
      
      const btn = document.getElementById('checkinBtn');
      if (checkinData.checked_in_today) {
        btn.className = 'checkin-btn checked-in';
        btn.textContent = '✓ 已签到';
        btn.disabled = true;
      } else if (checkinData.can_checkin) {
        btn.className = 'checkin-btn can-checkin';
        btn.textContent = '立即签到';
        btn.disabled = false;
      } else {
        btn.className = 'checkin-btn checked-in';
        btn.textContent = '明日再来';
        btn.disabled = true;
      }
    }
    
    // 渲染奖励列表
    function renderRewards() {
      const grid = document.getElementById('rewardsGrid');
      const totalCheckins = checkinData?.total_checkins || 0;
      const currentStreak = checkinData?.current_streak || 0;
      
      let html = '';
      rewards.forEach((reward, index) => {
        const dayNum = index + 1;
        const claimed = totalCheckins >= dayNum;
        const isCurrent = currentStreak === dayNum;
        
        let statusClass = 'locked';
        let statusText = '未解锁';
        
        if (claimed) {
          statusClass = 'claimed';
          statusText = '✓ 已领取';
        } else if (isCurrent && checkinData?.can_checkin) {
          statusClass = 'current';
          statusText = '可领取';
        } else if (totalCheckins >= dayNum - 1) {
          statusClass = 'available';
          statusText = '未领取';
        }
        
        let itemsText = '';
        if (reward.items && reward.items.length > 0) {
          itemsText = reward.items.map(i => i.name).join('+');
        }
        
        html += `
          <div class="reward-item ${statusClass}">
            <div class="reward-day">第${dayNum}天</div>
            <div class="reward-icon">${reward.icon}</div>
            <div class="reward-amount">
              ${reward.spirit_stones}灵石
              ${reward.spirit ? `<br>+${reward.spirit}灵气` : ''}
            </div>
            ${itemsText ? `<div style="font-size:0.7rem;color:#888;margin-top:3px">${itemsText}</div>` : ''}
            <div class="reward-status">${statusText}</div>
          </div>
        `;
      });
      
      grid.innerHTML = html;
    }
    
    // 渲染日历
    function renderCalendar() {
      const daysContainer = document.getElementById('calendarDays');
      const titleEl = document.getElementById('calendarTitle');
      
      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const today = new Date();
      
      titleEl.textContent = `${currentYear}年${currentMonth + 1}月`;
      
      let html = '';
      
      // 填充空白
      for (let i = 0; i < firstDay; i++) {
        html += '<div class="calendar-day empty"></div>';
      }
      
      // 获取当月签到日期
      const checkedDays = checkinData?.monthly_checkins || [];
      
      // 填充日期
      for (let day = 1; day <= daysInMonth; day++) {
        const isChecked = checkedDays.includes(day);
        const isToday = today.getFullYear() === currentYear && 
                       today.getMonth() === currentMonth && 
                       today.getDate() === day;
        
        let classes = 'calendar-day';
        if (isChecked) classes += ' checked';
        if (isToday) classes += ' today';
        
        html += `
          <div class="${classes}">
            <span class="day-number">${day}</span>
            ${isChecked ? '<span class="check-mark">✓</span>' : ''}
          </div>
        `;
      }
      
      daysContainer.innerHTML = html;
    }
    
    // 切换月份
    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      } else if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar();
    }
    
    // 执行签到
    async function doCheckin() {
      const btn = document.getElementById('checkinBtn');
      btn.disabled = true;
      btn.textContent = '签到中...';
      
      try {
        const response = await fetch('/api/checkin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ player_id: playerId })
        });
        
        const result = await response.json();
        
        if (result.success) {
          showToast(`🎉 ${result.message}`, 'success');
          
          // 显示飘字效果
          const reward = result.data.reward;
          showFloatingText(`+${reward.spirit_stones}灵石`);
          
          // 重新加载数据
          await loadCheckinData();
          renderRewards();
          renderCalendar();
        } else {
          showToast(result.message || '签到失败', 'error');
          btn.disabled = false;
          btn.textContent = '立即签到';
        }
      } catch (error) {
        console.error('签到失败:', error);
        showToast('签到失败，请稍后重试', 'error');
        btn.disabled = false;
        btn.textContent = '立即签到';
      }
    }
    
    // 显示提示
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
    
    // 显示飘字
    function showFloatingText(text) {
      const el = document.createElement('div');
      el.className = 'floating-text';
      el.textContent = text;
      el.style.left = '50%';
      el.style.top = '50%';
      document.body.appendChild(el);
      
      setTimeout(() => {
        el.remove();
      }, 1500);
    }
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
